<link rel="stylesheet" href="static/style.css">
<div class="full"><h1>My To-Do List</h1></div>
<body>
<div class = "form-container">
<form method="POST">
    {% csrf_token %}
    <input type="text" name="task" placeholder="Add a task">
    <button type="submit" name="add_task">Add</button>
</form>
</div>
<div class = "task-container">
<ul class = "task">
    {% for task in tasks %}
        <li>
            <form  method="POST" style="display:inline;">
                {% csrf_token %}
                <input type="checkbox" name="complete_task" value="{{ task.id }}" 
                       onchange="this.form.submit()" {% if task.completed %}checked{% endif %}>
                {{ task.title }}
            </form>

            <form method="POST" style="display:inline;">
                {% csrf_token %}
                <button type="submit" name="delete_task" value="{{ task.id }}">Delete</button>
            </form>
        </li>
    {% endfor %}
</ul>
</div>
<form class = "log" method="POST" action="{% url 'logout' %}">
    {% csrf_token %}
    <button type="submit">Logout</button>
</form>

</body>
